---
layout: archive
permalink: /talks/
author_profile: true
---

{% include base_path %}

{% for category in site.data.talks-list %}
  <h3 style="border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 30px;">{{ category.category }}</h3>
  <ul style="list-style-type: none; padding-left: 0;">
    {% for item in category.items %}
      <li style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-start; gap: 20px;">
        <div style="flex: 1;">{{ item.title }} <em>{{ item.venue }}</em></div>
        <div style="white-space: nowrap; color: #888; text-align: right;">{{ item.date }}</div>
      </li>
    {% endfor %}
  </ul>
{% endfor %}
