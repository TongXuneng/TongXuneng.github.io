---
layout: archive
permalink: /talks/
author_profile: true
---

{% include base_path %}

{% for category in site.data.talks-list %}
  <h3 style="border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 30px;">{{ category.category }}</h3>
  <ul style="list-style-type: none; padding-left: 0;">
    {% for item in category.items %}
      <li style="margin-bottom: 15px;">
        <div>{{ item.title }}</div>
        <div style="font-size: 0.9em; color: #555;">
          <em>{{ item.venue }}</em> 
          <span style="float: right; color: #888;">{{ item.date }}</span>
        </div>
      </li>
    {% endfor %}
  </ul>
{% endfor %}
